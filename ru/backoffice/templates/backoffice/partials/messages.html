{% if messages %}
  <div id="messages-container" class="space-y-2 mb-4 fade-in">
    {% for message in messages %}
      <div class="alert {% if 'error' in message.tags %}alert-error{% else %}alert-success{% endif %} {% if 'quick-dismiss' in message.tags %}ru-quick-dismiss{% endif %} alert-soft flex items-center justify-between gap-3">
        <div class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            {% if 'error' in message.tags %}
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            {% else %}
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            {% endif %}
          </svg>
          <span class="text-sm">{{ message }}</span>
        </div>
        <button onclick="fermerMessage(this)"
          class="btn btn-ghost btn-xs btn-circle shrink-0"
          aria-label="Fermer">
          <svg xmlns="http://www.w3.org/2000/svg" class="size-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    {% endfor %}
  </div>
{% endif %}
