<script>
// ══════════════════════════════════════════════════════════════
// TAILLE DES POLICES — persisté en localStorage (côté client)
// ══════════════════════════════════════════════════════════════
const RU_FONT_SIZES = {
  sm: { value: '90%',    label: 'Compact' },
  md: { value: '100%',   label: 'Normal'  },
  lg: { value: '112.5%', label: 'Grand'   },
};

function setFontSize(size) {
  if (!RU_FONT_SIZES[size]) return;
  document.documentElement.style.fontSize = RU_FONT_SIZES[size].value;
  localStorage.setItem('ru_font_size', size);
  updateFontButtons(size);
}

function updateFontButtons(size) {
  Object.keys(RU_FONT_SIZES).forEach(function(s) {
    const btn = document.getElementById('font-btn-' + s);
    if (!btn) return;
    const active = s === size;
    btn.classList.toggle('btn-primary', active);
    btn.classList.toggle('btn-ghost',   active);
    btn.classList.toggle('btn-outline', !active);
  });
}

(function initFontSize() {
  const saved = localStorage.getItem('ru_font_size') || 'md';
  document.addEventListener('DOMContentLoaded', function() {
    updateFontButtons(saved);
  });
})();

// ══════════════════════════════════════════════════════════════
// THÈME clair / sombre — toggle DaisyUI theme-controller + session
// ══════════════════════════════════════════════════════════════
function ruNormalizeThemeId(raw) {
  return raw === 'dark' ? 'dark' : 'light';
}

function setTheme(id) {
  const theme = ruNormalizeThemeId(id);
  document.documentElement.setAttribute('data-theme', theme);
  const toggle = document.getElementById('ru-theme-toggle');
  if (toggle) {
    toggle.checked = theme === 'dark';
    toggle.setAttribute('aria-label', theme === 'dark' ? 'Désactiver le thème sombre (passer en clair)' : 'Activer le thème sombre');
  }
  fetch("{% url 'backoffice:set_theme' %}", {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': '{{ csrf_token }}'
    },
    body: JSON.stringify({ theme: theme })
  });
}

function syncThemeToggleFromDocument() {
  const theme = ruNormalizeThemeId(document.documentElement.getAttribute('data-theme'));
  const toggle = document.getElementById('ru-theme-toggle');
  if (!toggle) return;
  toggle.checked = theme === 'dark';
  toggle.setAttribute('aria-label', theme === 'dark' ? 'Désactiver le thème sombre (passer en clair)' : 'Activer le thème sombre');
}

document.addEventListener('DOMContentLoaded', function() {
  syncThemeToggleFromDocument();
  const toggle = document.getElementById('ru-theme-toggle');
  if (!toggle) return;
  toggle.addEventListener('change', function() {
    setTheme(this.checked ? 'dark' : 'light');
  });
});
</script>
