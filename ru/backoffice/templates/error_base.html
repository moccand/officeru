<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Erreur{% endblock %} — Renseignement d'urbanisme</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style type="text/tailwindcss">
    * { font-family: 'Figtree', sans-serif !important; }
    .grid-bg {
      background-image:
        linear-gradient(rgba(37,99,235,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }
  </style>
</head>
<body class="min-h-screen bg-base-200 grid-bg">
  <main class="min-h-screen flex items-center justify-center p-4 md:p-8">
    <section class="card w-full max-w-4xl bg-base-100 shadow-xl border border-base-200">
      <div class="card-body items-center text-center gap-6 md:gap-7 p-8 md:p-12">
        <div class="badge badge-outline badge-lg md:badge-xl">{% block code %}Erreur{% endblock %}</div>
        <p class="text-sm md:text-base font-semibold tracking-wide text-primary">Renseignement d’urbanisme</p>
        <h1 class="text-4xl md:text-5xl font-extrabold text-base-content">{% block heading %}Une erreur est survenue{% endblock %}</h1>
        <p class="text-lg md:text-xl text-base-content/70 max-w-2xl">{% block message %}Impossible d’afficher cette page pour le moment.{% endblock %}</p>
        <div class="card-actions gap-3 mt-3">
          <a href="/" class="btn btn-primary">Retour à l’accueil</a>
          <button type="button" class="btn btn-ghost" onclick="history.back()">Page précédente</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
